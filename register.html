<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Lunex VN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="ted-auth.css">
<script src="security.js"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <h1>Tạo Tài Khoản Mới</h1>
                <p>Gia nhập cộng đồng Lunex VN</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username">USERNAME</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user icon-left"></i>
                        <input type="text" id="username" placeholder="Nhập username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">EMAIL</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope icon-left"></i>
                        <input type="email" id="email" placeholder="Nhập email của bạn" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">MẬT KHẨU</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                        <i class="fa-regular fa-eye icon-right" onclick="togglePassword('password')"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">XÁC NHẬN MẬT KHẨU</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                        <i class="fa-regular fa-eye icon-right" onclick="togglePassword('confirm-password')"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit btn-register">
                    <i class="fa-solid fa-user-plus"></i> ĐĂNG KÝ
                </button>
            </form>
            
            <div class="divider">HOẶC</div>
            
            <div class="auth-footer">
                Đã có tài khoản? <a href="login.html">Đăng nhập</a>
            </div>
            
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
